name: 領富 AI · 產業週報每週自動生成

# 每週一台灣時間 08:00（UTC 00:00）跑一次
# 用上週五前的最新資料寫週報
on:
  schedule:
    - cron: "0 0 * * 1"   # 週一 00:00 UTC = 週一 08:00 Taipei
  workflow_dispatch:        # 允許手動觸發（測試用）

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate weekly report
        run: python scripts/generate_weekly.py
        env:
          PYTHONIOENCODING: utf-8
          # 走 production worker（已配 Nvidia API key）
          ASK_URL: https://leadfuai.com/api/ask

      - name: Commit if changed
        run: |
          git config user.name "leadfu-ai-bot"
          git config user.email "bot@leadfu.ai"
          git add data/weekly_report.json
          if ! git diff --staged --quiet; then
            WEEK=$(date -u +"第 %V 週")
            git commit -m "data: 產業週報自動生成 ($WEEK)"
            git push
            echo "✅ 週報已 commit 並 push"
          else
            echo "ℹ️ 週報無變動，跳過"
          fi

name: 領富 AI · Cloudflare Worker 自動部署

# 觸發時機：
#  - push 到 main 且改動了 worker、靜態檔、SW
#  - 也允許手動觸發（測試用）
#
# 自動跳過：純資料更新（只動 data/*.json）會走每日 workflow，
# 這個 workflow 只在「程式碼或靜態資產有變」時啟動，避免每天無謂部署。
on:
  push:
    branches: [main]
    paths:
      - "worker.js"
      - "wrangler.jsonc"
      - ".assetsignore"
      - "index.html"
      - "pages/**"
      - "js/**"
      - "css/**"
      - "icons/**"
      - "sw.js"
      - "manifest.json"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Workers
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Show what will be deployed (debug)
        run: |
          echo "=== Repo size summary ==="
          du -sh . .git data pages js css icons scripts 2>/dev/null || true
          echo ""
          echo "=== Big files in data/ ==="
          ls -lhS data/*.json 2>/dev/null | head -10 || true
          echo ""
          echo "=== .assetsignore content ==="
          cat .assetsignore 2>/dev/null || echo "(no .assetsignore)"
          echo ""
          echo "=== wrangler.jsonc ==="
          cat wrangler.jsonc

      - name: Deploy worker (含所有靜態資產)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --verbose

      - name: Show deploy result
        if: success()
        run: |
          echo "✅ Deployed to leadfuai.com"
          echo "Worker version: $(grep -oP 'VERSION = \"\K[^\"]+' sw.js)"

<script>
document.addEventListener("DOMContentLoaded", async () => {
  await window.LeadFu.ready;
  const L = window.LeadFu;

  const STORAGE_KEY = "leadfu_chat_history_v1";
  const chatList = document.getElementById("chatList");
  const chatScroll = document.getElementById("chatScroll");
  const chatInput = document.getElementById("chatInput");
  const chatForm = document.getElementById("chatForm");
  const sendBtn = document.getElementById("chatSendBtn");
  const newBtn = document.getElementById("newChatBtn");
  const micBtn = document.getElementById("chatMicBtn");

  let history = [];

  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) history = JSON.parse(raw) || [];
  } catch {}

  // URL 帶 ?q=... 從首頁過來 → 先清空舊歷史開新對話
  const initialQ = new URLSearchParams(location.search).get("q");
  if (initialQ) {
    history = [];
    chatList.innerHTML = "";
    localStorage.removeItem(STORAGE_KEY);
    window.history.replaceState({}, "", "ai.html");
    sendMessage(initialQ);
  } else if (history.length === 0) {
    showWelcome();
  } else {
    history.forEach(renderBubble);
    scrollToBottom();
  }

  function showWelcome() {
    const welcome = `您好！我是領富 AI 助理 ✨

我可以幫您：
・查股票：講代號（2330）或公司名（台積電）都行
・找熱門：「今天漲最多的上市股」「半導體上市熱門」
・問基本面：「穎台科技最近怎樣」「環球晶基本資料」
・學概念：「什麼是月營收年增率」「本益比怎麼看」
・避免被騙：「怎麼避免投資詐騙」

也可以直接點下面的按鈕，或按麥克風用講的：`;
    renderBubble({ role: "assistant", content: welcome });
    renderSuggestionChips([
      { icon: "📈", text: "今天漲最多的上市股" },
      { icon: "🔬", text: "半導體上市熱門股" },
      { icon: "💊", text: "生技上櫃熱門" },
      { icon: "⚡", text: "興櫃成交活躍" },
      { icon: "🏢", text: "穎台科技基本面" },
      { icon: "⚠", text: "怎麼避免投資詐騙" }
    ]);
    scrollToBottom();
  }

  function renderBubble(msg) {
    const div = document.createElement("div");
    div.className = "chat-bubble chat-bubble-" + msg.role;
    const avatar = msg.role === "assistant"
      ? `<div class="chat-avatar chat-avatar-ai">AI</div>`
      : `<div class="chat-avatar chat-avatar-user">我</div>`;
    const ttsBtn = (msg.role === "assistant" && window.LeadFuTTS && window.LeadFuTTS.isSupported())
      ? `<button class="chat-tts-btn" type="button" aria-label="朗讀此訊息" title="朗讀">🔊</button>`
      : "";
    div.innerHTML = `${avatar}<div class="chat-content">${ttsBtn}${formatText(msg.content)}</div>`;
    if (ttsBtn) {
      const btn = div.querySelector(".chat-tts-btn");
      btn.addEventListener("click", (e) => {
        e.preventDefault();
        e.stopPropagation();
        window.LeadFuTTS.toggleButton(btn, msg.content);
      });
    }
    chatList.appendChild(div);
  }

  function renderSuggestionChips(list) {
    const wrap = document.createElement("div");
    wrap.className = "chat-suggestions";
    wrap.innerHTML = list.map(it =>
      `<button type="button" class="chat-chip" data-q="${escAttr(it.text)}">${it.icon} ${it.text}</button>`
    ).join("");
    wrap.querySelectorAll(".chat-chip").forEach(b => {
      b.addEventListener("click", () => sendMessage(b.dataset.q));
    });
    chatList.appendChild(wrap);
  }

  function renderTypingIndicator() {
    const div = document.createElement("div");
    div.className = "chat-bubble chat-bubble-assistant chat-typing";
    div.id = "chat-typing";
    div.innerHTML = `<div class="chat-avatar chat-avatar-ai">AI</div><div class="chat-content"><span class="chat-dot"></span><span class="chat-dot"></span><span class="chat-dot"></span></div>`;
    chatList.appendChild(div);
    scrollToBottom();
  }

  function removeTypingIndicator() {
    const t = document.getElementById("chat-typing");
    if (t) t.remove();
  }

  // 預編譯個股代號 → 名稱對照（給 formatText 加連結用）
  const _stockByCode = {};
  (L.data.stocks || []).forEach(s => { _stockByCode[s.code] = s; });

  function formatText(text) {
    if (!text) return "";
    // 1. escape HTML 防 XSS
    let esc = String(text).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    // 2. 個股代號可點：把 4 位數字代號（前後是空白/標點/邊界）轉成連結
    //    例如「2330 台積電」→「<a>2330 台積電</a>」
    esc = esc.replace(/(^|[\s（(「『\[、，,])(\d{4})(\s+)([一-龥A-Za-z\-\*KY]{1,12})/g,
      (m, pre, code, sp, name) => {
        const s = _stockByCode[code];
        if (!s) return m;
        return `${pre}<a href="stock-detail.html?code=${code}" class="chat-stock-link">${code}${sp}${name}</a>`;
      });
    // 也處理單獨出現的代號（沒接公司名的情況）
    esc = esc.replace(/(^|[\s（(「『\[、，,])(\d{4})(?=[）)」』\]、，,\s。.!?]|$)/g,
      (m, pre, code) => {
        const s = _stockByCode[code];
        if (!s) return m;
        return `${pre}<a href="stock-detail.html?code=${code}" class="chat-stock-link">${code}</a>`;
      });
    // 3. 輕量 markdown
    esc = esc.replace(/\*\*([^*\n]+?)\*\*/g, "<strong>$1</strong>");
    esc = esc.replace(/(^|[^*])\*([^*\n]+?)\*(?!\*)/g, "$1<em>$2</em>");
    esc = esc.replace(/`([^`\n]+?)`/g, "<code style=\"background:#f0f3f8;padding:1px 5px;border-radius:3px;font-size:0.92em;\">$1</code>");
    // 4. 段落 + 換行
    return esc.split(/\n{2,}/).map(p => `<p>${p.replace(/\n/g, "<br>")}</p>`).join("");
  }
  function escAttr(s) { return String(s).replace(/"/g, "&quot;"); }

  function scrollToBottom() {
    requestAnimationFrame(() => { chatScroll.scrollTop = chatScroll.scrollHeight; });
  }

  function saveHistory() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(history.slice(-20)));
    } catch {}
  }

  let _pending = false;   // 防止重複送
  async function sendMessage(text) {
    text = (text || "").trim();
    if (!text) return;
    if (_pending) return;  // 上一個還在跑就不送
    _pending = true;

    chatList.querySelectorAll(".chat-suggestions").forEach(el => el.remove());

    const userMsg = { role: "user", content: text, ts: Date.now() };
    history.push(userMsg);
    renderBubble(userMsg);
    saveHistory();
    scrollToBottom();

    sendBtn.disabled = true;
    sendBtn.textContent = "...";
    chatInput.disabled = true;

    const context = buildContext(text);

    // 預先建立 AI 訊息泡泡（空的，之後 streaming 補內容進去）
    const aiMsg = { role: "assistant", content: "", ts: Date.now() };
    const aiBubble = createStreamingBubble();
    let fullText = "";
    let gotFirstChunk = false;

    try {
      const resp = await fetch("/api/ask", {
        method: "POST",
        headers: {
          "Content-Type": "application/json; charset=utf-8",
          "Accept": "text/event-stream"
        },
        body: JSON.stringify({
          messages: history.map(m => ({ role: m.role, content: m.content })),
          context,
          stream: true
        })
      });

      if (!resp.ok) {
        // 錯誤情形 → 改用一般 JSON 模式讀錯誤訊息
        let errInfo;
        try { errInfo = await resp.json(); } catch { errInfo = { error: "AI 暫時無法回答" }; }
        const errText = errInfo.error || "AI 暫時無法回答";
        const isRateLimit = resp.status === 429 || errInfo.status === 429;
        const tail = isRateLimit
          ? "\n\n💡 提示：免費 AI 額度有速率限制。請等 5-10 秒後再試一次。"
          : "\n\n請稍後再試一次。";
        aiMsg.content = errText + tail;
        aiBubble.update(aiMsg.content);
        aiBubble.finalize();
        history.push(aiMsg);
        saveHistory();
        return;
      }

      // ===== Streaming：解析 SSE chunks =====
      const reader = resp.body.getReader();
      const decoder = new TextDecoder("utf-8");
      let buffer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });

        // 拆成 SSE event（以 \n\n 為界）
        const lines = buffer.split("\n");
        buffer = lines.pop() || "";  // 最後不完整的留著

        for (const raw of lines) {
          const line = raw.trim();
          if (!line.startsWith("data:")) continue;
          const data = line.slice(5).trim();
          if (data === "[DONE]") continue;
          try {
            const json = JSON.parse(data);
            const delta = json.choices?.[0]?.delta?.content;
            if (delta) {
              if (!gotFirstChunk) {
                aiBubble.removeTyping();
                gotFirstChunk = true;
              }
              fullText += delta;
              aiBubble.update(fullText);
              scrollToBottomIfNearBottom();
            }
          } catch {}
        }
      }

      aiMsg.content = fullText || "(AI 沒有回應)";
      aiBubble.update(aiMsg.content);
      aiBubble.finalize();
      history.push(aiMsg);
      saveHistory();
    } catch (err) {
      aiMsg.content = "連線 AI 服務失敗，請檢查網路後再試。\n\n" + (err.message || "");
      aiBubble.update(aiMsg.content);
      aiBubble.finalize();
      history.push(aiMsg);
      saveHistory();
    } finally {
      _pending = false;
      sendBtn.disabled = false;
      sendBtn.textContent = "送出";
      chatInput.disabled = false;
      scrollToBottom();
      chatInput.focus();
    }
  }

  // 建立一個「streaming 中」的 AI 泡泡，回傳控制函式
  function createStreamingBubble() {
    const div = document.createElement("div");
    div.className = "chat-bubble chat-bubble-assistant chat-streaming";
    div.innerHTML = `
      <div class="chat-avatar chat-avatar-ai">AI</div>
      <div class="chat-content">
        <span class="chat-typing-mini"><span class="chat-dot"></span><span class="chat-dot"></span><span class="chat-dot"></span></span>
      </div>`;
    chatList.appendChild(div);
    scrollToBottom();
    const contentEl = div.querySelector(".chat-content");
    let lastText = "";
    return {
      removeTyping() {
        const t = div.querySelector(".chat-typing-mini");
        if (t) t.remove();
      },
      update(text) {
        lastText = text;
        contentEl.innerHTML = formatText(text);
      },
      finalize() {
        div.classList.remove("chat-streaming");
        // streaming 完成後加 🔊 朗讀按鈕
        if (window.LeadFuTTS && window.LeadFuTTS.isSupported() && lastText) {
          const btn = document.createElement("button");
          btn.className = "chat-tts-btn";
          btn.type = "button";
          btn.setAttribute("aria-label", "朗讀此訊息");
          btn.title = "朗讀";
          btn.textContent = "🔊";
          btn.addEventListener("click", (e) => {
            e.preventDefault();
            e.stopPropagation();
            window.LeadFuTTS.toggleButton(btn, lastText);
          });
          contentEl.insertBefore(btn, contentEl.firstChild);
        }
      }
    };
  }

  function scrollToBottomIfNearBottom() {
    // 只在使用者沒往上滑時才自動捲到底（streaming 過程中允許看上方）
    const threshold = 120;
    const fromBottom = chatScroll.scrollHeight - chatScroll.scrollTop - chatScroll.clientHeight;
    if (fromBottom < threshold) scrollToBottom();
  }

  /** 把股票物件轉成「欄位名自帶單位」的版本，避免 AI 把金額誤讀為 % */
  function normalizeStockForAI(s) {
    const pct = L.pctChange(s.price, s.change);
    return {
      code: s.code,
      name: s.name,
      market: s.market,
      category: s.category,
      price_TWD: s.price,
      todayChange_TWD: s.change,                      // 今日漲跌「金額」(新台幣元)
      todayChangePercent: Number(pct.toFixed(2)),     // 今日漲跌「百分比」
      volume_lots: s.volume                            // 成交量（張）
    };
  }

  function buildContext(question) {
    if (!question) return {};
    const ctx = {};
    const all = L.data.stocks || [];

    const codeMatch = question.match(/\b\d{4}\b/);
    let targetStock = null;
    if (codeMatch) targetStock = all.find(s => s.code === codeMatch[0]);
    if (!targetStock) {
      const sortedByLen = [...all].filter(s => s.name && s.name.length >= 2)
                                  .sort((a, b) => b.name.length - a.name.length);
      targetStock = sortedByLen.find(s => question.includes(s.name));
    }

    if (targetStock) {
      ctx.relevantStocks = [normalizeStockForAI(targetStock)];
      const co = (L.data.companies && L.data.companies[targetStock.code]) || null;
      if (co) ctx.companyInfo = co;
      const rev = (L.data.revenue && L.data.revenue[targetStock.code]) || null;
      if (rev) ctx.revenueInfo = rev;
      return ctx;
    }

    let market = null;
    if (/上市/.test(question)) market = "listed";
    else if (/上櫃/.test(question)) market = "otc";
    else if (/興櫃/.test(question)) market = "emerging";

    const industries = ["半導體","電子零組件","電腦及周邊","通信網路","電子通路",
                        "光電","生技醫療","金融保險","綠能環保","數位雲端",
                        "電子","電機機械","鋼鐵","紡織","食品","汽車","建材營造"];
    const matchedIndustry = industries.find(i => question.includes(i));

    let pool = all.slice();
    if (market) pool = pool.filter(s => s.market === market);
    if (matchedIndustry) pool = pool.filter(s => s.category && s.category.includes(matchedIndustry));
    pool = pool.filter(s => s.price > 0);

    if (/漲|上漲/.test(question)) {
      pool.sort((a, b) => L.pctChange(b.price, b.change) - L.pctChange(a.price, a.change));
    } else if (/跌|下跌/.test(question)) {
      pool.sort((a, b) => L.pctChange(a.price, a.change) - L.pctChange(b.price, b.change));
    } else {
      pool.sort((a, b) => (b.volume || 0) - (a.volume || 0));
    }
    ctx.relevantStocks = pool.slice(0, 15).map(normalizeStockForAI);
    return ctx;
  }

  chatForm.addEventListener("submit", (e) => {
    e.preventDefault();
    const text = chatInput.value.trim();
    if (text) {
      chatInput.value = "";
      autoResize();
      sendMessage(text);
    }
  });

  function autoResize() {
    chatInput.style.height = "auto";
    chatInput.style.height = Math.min(chatInput.scrollHeight, 160) + "px";
  }
  chatInput.addEventListener("input", autoResize);
  chatInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      chatForm.dispatchEvent(new Event("submit"));
    }
  });

  newBtn.addEventListener("click", () => {
    if (history.length > 0 && !confirm("確定要開新對話嗎？目前的對話歷史會清空。")) return;
    history = [];
    chatList.innerHTML = "";
    localStorage.removeItem(STORAGE_KEY);
    showWelcome();
  });

  // 語音輸入
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    micBtn.style.display = "none";
  } else {
    let recog = null;
    micBtn.addEventListener("click", () => {
      if (recog) {
        try { recog.abort(); } catch {}
        recog = null;
        micBtn.classList.remove("chat-mic-active");
        return;
      }
      recog = new SR();
      recog.lang = "zh-TW";
      recog.continuous = false;
      recog.interimResults = true;
      recog.maxAlternatives = 1;
      micBtn.classList.add("chat-mic-active");

      let finalText = "";
      recog.onresult = (e) => {
        let t = "";
        for (let i = 0; i < e.results.length; i++) t += e.results[i][0].transcript;
        t = L.normalizeSearchQuery ? L.normalizeSearchQuery(t) : t;
        chatInput.value = t;
        autoResize();
        if (e.results[e.results.length - 1].isFinal) finalText = t;
      };
      recog.onerror = () => {
        micBtn.classList.remove("chat-mic-active");
        recog = null;
      };
      recog.onend = () => {
        micBtn.classList.remove("chat-mic-active");
        recog = null;
        if (finalText) {
          chatInput.value = finalText;
          autoResize();
          setTimeout(() => chatForm.dispatchEvent(new Event("submit")), 200);
        }
      };
      try { recog.start(); } catch { micBtn.classList.remove("chat-mic-active"); recog = null; }
    });
  }
});
</script>
</body>
</html>

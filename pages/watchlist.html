<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自選股 - 領富 AI</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header class="top-bar">
  <div class="container top-bar-inner">
    <div class="top-left"><span id="todayDate"></span><span class="divider">|</span><span>台股全市場財經資訊網</span></div>
    <div class="top-right"><a href="login.html">會員登入</a><a href="register.html">免費註冊</a><a href="contact.html">客服 0800-035-178</a></div>
  </div>
</header>

<div class="logo-bar">
  <div class="container logo-bar-inner">
    <a href="../index.html" class="logo">
      <span class="logo-bi">領富</span><span class="logo-ai">AI</span>
      <span class="logo-sub">LeadFu · 領先市場兩步</span>
    </a>
    <div class="search-box">
      <input type="text" id="stockSearch" placeholder="輸入股票代號 / 公司名稱">
      <button id="searchBtn">查詢</button>
    </div>
  </div>
</div>

<nav class="main-nav">
  <div class="container">
    <ul>
      <li><a href="../index.html">首頁</a></li>
      <li><a href="stocks.html">股價總覽</a></li>
      <li><a href="stocks.html?status=興櫃">興櫃股票</a></li>
      <li><a href="stocks.html?status=準上市">準上市</a></li>
      <li><a href="news.html">財經新聞</a></li>
      <li><a href="discussion.html">討論區</a></li>
      <li><a href="ipo.html">新股抽籤</a></li>
      <li><a href="announcements.html">公司公告</a></li>
      <li class="active"><a href="watchlist.html">自選股</a></li>
    </ul>
  </div>
</nav>

<div class="page-head">
  <div class="container">
    <h1>我的自選股</h1>
    <div class="breadcrumb">首頁 ▸ 自選股</div>
  </div>
</div>

<main class="container" style="padding:20px 12px 40px;">

  <div class="panel">
    <div class="panel-head">
      <h2>自選清單</h2>
      <div style="font-size:12px;color:#666;">共 <span id="favCount">0</span> 檔・資料儲存於本機瀏覽器</div>
    </div>
    <table class="stock-table">
      <thead>
        <tr>
          <th>代號</th><th>名稱</th>
          <th class="num">成交價</th>
          <th class="num">漲跌</th>
          <th class="num">漲跌幅</th>
          <th class="num">成交量(張)</th>
          <th>類別</th><th>狀態</th><th></th>
        </tr>
      </thead>
      <tbody id="favTbody"></tbody>
    </table>
    <div class="panel-foot">
      <button id="clearAll" style="background:none;border:1px solid #d0d5dc;padding:6px 14px;border-radius:2px;color:#666;font-size:12px;">清空全部自選</button>
    </div>
  </div>

  <div class="ai-panel" style="margin: 20px 0;">
    <div class="ai-panel-head">
      <div class="ai-panel-title">AI 自選股數據彙整</div>
      <button class="ai-trigger" data-action="stockAnalyze" data-target="#aiFavResult">分析我的自選 →</button>
    </div>
    <p class="ai-placeholder">AI 彙整你的自選股數據（產業分布、漲跌統計），僅供參考。</p>
    <div id="aiFavResult" style="margin-top:12px;"></div>
  </div>

</main>

<footer class="site-footer">
  <div class="copyright"><div class="container">© 2026 領富 AI. All rights reserved.</div></div>
</footer>

<script src="../js/main.js"></script>
<script>
document.addEventListener("DOMContentLoaded", async () => {
  await window.LeadFu.ready;
  const { data, findStock, getWatchlist, removeFromWatchlist, fmtPrice, fmtChange, fmtPct, pctChange, changeClass, arrow, pageHref } = window.LeadFu;

  function render() {
    const codes = getWatchlist();
    const list = codes.map(findStock).filter(Boolean);
    document.getElementById("favCount").textContent = list.length;
    const tbody = document.getElementById("favTbody");

    if (list.length === 0) {
      tbody.innerHTML = `
        <tr><td colspan="9" style="text-align:center;padding:40px;color:#999;">
          目前尚無自選股<br>
          <a href="stocks.html" style="display:inline-block;margin-top:12px;color:#1B4332;">前往股價列表加入自選 →</a>
        </td></tr>`;
      return;
    }

    tbody.innerHTML = list.map(s => {
      const pct = pctChange(s.price, s.change);
      const cls = changeClass(s.change);
      return `<tr data-code="${s.code}">
        <td class="code"><a href="${pageHref('stock-detail.html?code=' + s.code)}">${s.code}</a></td>
        <td class="name"><a href="${pageHref('stock-detail.html?code=' + s.code)}" style="color:inherit;">${s.name}</a></td>
        <td class="num ${cls}">${fmtPrice(s.price)}</td>
        <td class="num ${cls}">${arrow(s.change)} ${fmtChange(s.change)}</td>
        <td class="num ${cls}">${fmtPct(pct)}</td>
        <td class="num">${s.volume.toLocaleString("zh-TW")}</td>
        <td>${s.category}</td>
        <td><span class="status-pill status-${s.status}">${s.status}</span></td>
        <td><button class="add-btn" data-rm="${s.code}" style="border-color:#1B4332;color:#1B4332;">移除</button></td>
      </tr>`;
    }).join("");
  }

  document.addEventListener("click", e => {
    const rm = e.target.dataset?.rm;
    if (rm) { removeFromWatchlist(rm); render(); }
  });

  document.getElementById("clearAll").addEventListener("click", () => {
    if (confirm("確定要清空全部自選股？")) {
      localStorage.removeItem("berich_watchlist");
      render();
    }
  });

  render();
});
</script>
</body>
</html>

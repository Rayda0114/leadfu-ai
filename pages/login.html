<main class="container" style="min-height: 60vh;">

  <div class="form-card">
    <h2>會員登入</h2>
    <p class="form-sub">登入即可使用自選股、即時推播、VIP 報告</p>

    <form id="loginForm">
      <div class="form-group">
        <label for="account">Email</label>
        <input type="email" id="account" placeholder="請輸入註冊時的 Email" required>
      </div>
      <div class="form-group">
        <label for="pwd">密碼</label>
        <input type="password" id="pwd" placeholder="請輸入密碼" required>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:12px;margin: 6px 0 12px;">
        <label><input type="checkbox" id="remember"> 記住我</label>
        <a href="#">忘記密碼？</a>
      </div>
      <button type="submit" class="form-btn">登入</button>
    </form>

    <div style="margin: 20px 0; text-align: center; color: #aaa; font-size: 12px; position: relative;">
      <span style="background: #fff; padding: 0 12px; position: relative; z-index: 1;">或使用社群帳號</span>
      <div style="position: absolute; top: 50%; left: 0; right: 0; border-top: 1px solid #eef0f3; z-index: 0;"></div>
    </div>

    <div style="display: grid; gap: 8px;">
      <button type="button" id="googleLoginBtn" style="padding:11px;border:1px solid #d0d5dc;background:#fff;border-radius:6px;font-size:14px;font-weight:600;color:#444;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;">
        <span style="font-size:16px;">G</span> 用 Google 登入
      </button>
      <button type="button" id="facebookLoginBtn" style="padding:11px;border:none;background:#1877F2;color:#fff;border-radius:6px;font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;">
        <span style="font-size:16px;">f</span> 用 Facebook 登入
      </button>
    </div>

    <div class="form-foot">
      還沒有會員？ <a href="register.html" style="font-weight:600;">立即免費註冊</a>
    </div>
  </div>

</main>

<script src="../js/main.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/auth.js"></script>
<script>
document.getElementById("loginForm").addEventListener("submit", async e => {
  e.preventDefault();
  const btn = e.target.querySelector(".form-btn");
  const email = document.getElementById("account").value.trim();
  const pwd   = document.getElementById("pwd").value;
  if (!email || !pwd) return alert("請輸入 Email 與密碼");

  btn.disabled = true;
  btn.textContent = "登入中...";

  try {
    await window.LeadFuAuth.signIn({ email, password: pwd });
    location.href = "member.html";
  } catch (err) {
    alert(window.LeadFuAuth.zhError(err));
    btn.disabled = false;
    btn.textContent = "登入";
  }
});

// 社群一鍵登入
document.getElementById("googleLoginBtn").addEventListener("click", async () => {
  try {
    await window.LeadFuAuth.signInWithGoogle();
    // 成功會自動跳轉到 Google 授權頁
  } catch (err) {
    alert(window.LeadFuAuth.zhError(err));
  }
});
document.getElementById("facebookLoginBtn").addEventListener("click", async () => {
  try {
    await window.LeadFuAuth.signInWithFacebook();
  } catch (err) {
    alert(window.LeadFuAuth.zhError(err));
  }
});
</script>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>產業分類 - 領富 AI</title>
<link rel="stylesheet" href="../css/style.css">
<style>
  .ind-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 16px; }
  @media (max-width: 768px) { .ind-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 480px) { .ind-grid { grid-template-columns: 1fr; } }
  .ind-card {
    background: #fff;
    border: 1px solid #e0e3e8;
    border-radius: 6px;
    padding: 14px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .ind-card:hover {
    border-color: #1B4332;
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(200,16,46,0.08);
  }
  .ind-card.active {
    border-color: #1B4332;
    background: linear-gradient(180deg, #fff8e1 0%, #fff 100%);
  }
  .ind-icon { font-size: 22px; margin-bottom: 6px; }
  .ind-name { font-weight: 700; color: #163A2E; font-size: 14px; margin-bottom: 4px; }
  .ind-stats { font-size: 11px; color: #666; line-height: 1.7; }
  .ind-pct { font-size: 18px; font-weight: 700; margin-top: 4px; }
  .ind-pct.up { color: #1B4332; }
  .ind-pct.down { color: #1a8e3e; }
</style>
</head>
<body>

<header class="top-bar">
  <div class="container top-bar-inner">
    <div class="top-left"><span id="todayDate"></span><span class="divider">|</span><span>台股全市場財經資訊網</span></div>
    <div class="top-right"><a href="login.html">會員登入</a><a href="register.html">免費註冊</a><a href="contact.html">客服 0800-035-178</a></div>
  </div>
</header>

<div class="logo-bar">
  <div class="container logo-bar-inner">
    <a href="../index.html" class="logo">
      <span class="logo-bi">領富</span><span class="logo-ai">AI</span>
      <span class="logo-sub">LeadFu · 領先市場兩步</span>
    </a>
    <div class="search-box">
      <input type="text" id="stockSearch" placeholder="輸入股票代號 / 公司名稱">
      <button id="searchBtn">查詢</button>
    </div>
  </div>
</div>

<nav class="main-nav">
  <div class="container">
    <ul>
      <li><a href="../index.html">首頁</a></li>
      <li><a href="stocks.html">股價總覽</a></li>
      <li><a href="screener.html">進階選股</a></li>
      <li class="active"><a href="industries.html">產業分類</a></li>
      <li><a href="news.html">財經新聞</a></li>
      <li><a href="discussion.html">討論區</a></li>
      <li><a href="ipo.html">新股抽籤</a></li>
      <li><a href="watchlist.html">自選股</a></li>
    </ul>
  </div>
</nav>

<div class="page-head">
  <div class="container">
    <h1>產業分類瀏覽</h1>
    <div class="breadcrumb">首頁 ▸ 產業分類</div>
  </div>
</div>

<main class="container" style="padding: 16px 12px 40px;">

  <div class="panel">
    <div class="panel-head">
      <h2>產業類股總覽</h2>
      <div style="font-size:12px;color:#666;">點選產業 ▾ 查看該產業全部個股</div>
    </div>
    <div class="ind-grid" id="indGrid"></div>
  </div>

  <div class="panel" id="industryDetailPanel" style="display:none;">
    <div class="panel-head">
      <h2 id="indTitle">--</h2>
      <button id="closeInd" style="background:none;border:1px solid #d0d5dc;padding:4px 10px;border-radius:2px;font-size:12px;color:#666;">關閉 ✕</button>
    </div>
    <div style="padding: 14px 20px; background: #f8fafd; border-bottom: 1px solid #e0e3e8;">
      <div id="indSummary" style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;font-size:13px;"></div>
    </div>
    <table class="stock-table">
      <thead>
        <tr>
          <th>代號</th><th>名稱</th>
          <th class="num">成交價</th>
          <th class="num">漲跌</th>
          <th class="num">漲跌幅</th>
          <th class="num">成交量</th>
          <th>狀態</th><th></th>
        </tr>
      </thead>
      <tbody id="indStocks"></tbody>
    </table>
  </div>

  <div class="ai-panel">
    <div class="ai-panel-head">
      <div class="ai-panel-title">AI 產業趨勢分析</div>
      <button class="ai-trigger" data-action="newsSummary" data-target="#aiIndResult">分析熱門產業 →</button>
    </div>
    <p class="ai-placeholder">AI 根據今日漲跌與資金流向，分析最熱門 / 最冷淡的產業類別。</p>
    <div id="aiIndResult" style="margin-top:12px;"></div>
  </div>

</main>

<footer class="site-footer">
  <div class="copyright"><div class="container">© 2026 領富 AI. All rights reserved.</div></div>
</footer>

<script src="../js/main.js"></script>
<script>
document.addEventListener("DOMContentLoaded", async () => {
  await window.LeadFu.ready;
  const { data, fmtPrice, fmtChange, fmtPct, pctChange, changeClass, arrow, pageHref, isInWatchlist } = window.LeadFu;

  // 產業 icon 對照表
  const icons = {
    "半導體": "💎", "半導體封測": "🔬", "晶圓代工": "⚙️", "IC設計": "🧠",
    "電子零組件": "🔌", "電子設備": "🖥️", "PCB": "🔲", "PCB銅箔": "🧱", "PCB載板": "🟧",
    "連接器": "🔗", "電源管理IC": "⚡", "電池材料": "🔋",
    "生技醫療": "💊", "面板": "📺", "光學元件": "📷",
    "鋼鐵": "🏗️", "化學材料": "🧪", "機械": "⚙️",
    "紡織成衣": "👕", "運動器材": "🏃", "家具": "🛋️",
    "遊戲軟體": "🎮", "工業電腦": "💻", "伺服器": "🖧"
  };

  // 計算每個產業的統計
  const cats = {};
  data.stocks.forEach(s => {
    if (!cats[s.category]) {
      cats[s.category] = { name: s.category, stocks: [], totalChange: 0, totalVol: 0 };
    }
    cats[s.category].stocks.push(s);
    cats[s.category].totalChange += pctChange(s.price, s.change);
    cats[s.category].totalVol += s.volume;
  });

  const list = Object.values(cats).map(c => ({
    ...c,
    count: c.stocks.length,
    avgChange: c.totalChange / c.stocks.length
  })).sort((a, b) => b.avgChange - a.avgChange);

  // 渲染卡片
  document.getElementById("indGrid").innerHTML = list.map(c => {
    const cls = c.avgChange > 0 ? "up" : (c.avgChange < 0 ? "down" : "flat");
    const arr = c.avgChange > 0 ? "▲" : (c.avgChange < 0 ? "▼" : "－");
    const icon = icons[c.name] || "📁";
    return `<div class="ind-card" data-cat="${c.name}">
      <div class="ind-icon">${icon}</div>
      <div class="ind-name">${c.name}</div>
      <div class="ind-stats">
        ${c.count} 檔・量 ${c.totalVol.toLocaleString()}
      </div>
      <div class="ind-pct ${cls}">${arr} ${c.avgChange.toFixed(2)}%</div>
    </div>`;
  }).join("");

  // 點卡片顯示產業內個股
  document.querySelectorAll(".ind-card").forEach(card => {
    card.addEventListener("click", () => {
      document.querySelectorAll(".ind-card").forEach(c => c.classList.remove("active"));
      card.classList.add("active");
      showIndustry(card.dataset.cat);
    });
  });

  function showIndustry(cat) {
    const c = cats[cat];
    if (!c) return;
    const panel = document.getElementById("industryDetailPanel");
    panel.style.display = "block";
    document.getElementById("indTitle").textContent = `${icons[cat] || "📁"} ${cat} (${c.count} 檔)`;

    const avg = c.totalChange / c.count;
    const up = c.stocks.filter(s => s.change > 0).length;
    const down = c.stocks.filter(s => s.change < 0).length;
    const cls = avg > 0 ? "up" : (avg < 0 ? "down" : "flat");
    document.getElementById("indSummary").innerHTML = `
      <div><div style="color:#888;font-size:11px;">平均漲跌幅</div><div class="${cls}" style="font-weight:700;font-size:16px;">${avg > 0 ? "+" : ""}${avg.toFixed(2)}%</div></div>
      <div><div style="color:#888;font-size:11px;">上漲家數</div><div class="up" style="font-weight:700;font-size:16px;">${up} 家</div></div>
      <div><div style="color:#888;font-size:11px;">下跌家數</div><div class="down" style="font-weight:700;font-size:16px;">${down} 家</div></div>
      <div><div style="color:#888;font-size:11px;">總成交量</div><div style="font-weight:700;font-size:16px;">${c.totalVol.toLocaleString()} 張</div></div>
    `;

    document.getElementById("indStocks").innerHTML = c.stocks.map(s => {
      const pct = pctChange(s.price, s.change);
      const k = changeClass(s.change);
      const fav = isInWatchlist(s.code);
      return `<tr data-code="${s.code}">
        <td class="code"><a href="${pageHref('stock-detail.html?code=' + s.code)}">${s.code}</a></td>
        <td><a href="${pageHref('stock-detail.html?code=' + s.code)}" style="color:inherit;">${s.name}</a></td>
        <td class="num ${k}">${fmtPrice(s.price)}</td>
        <td class="num ${k}">${arrow(s.change)} ${fmtChange(s.change)}</td>
        <td class="num ${k}">${fmtPct(pct)}</td>
        <td class="num">${s.volume.toLocaleString("zh-TW")}</td>
        <td><span class="status-pill status-${s.status}">${s.status}</span></td>
        <td><button class="add-btn ${fav?'in-fav':''}" data-code="${s.code}">${fav?'✓':'＋'}</button></td>
      </tr>`;
    }).join("");

    panel.scrollIntoView({ behavior: "smooth", block: "start" });
  }

  document.getElementById("closeInd").addEventListener("click", () => {
    document.getElementById("industryDetailPanel").style.display = "none";
    document.querySelectorAll(".ind-card").forEach(c => c.classList.remove("active"));
  });

  // URL 參數開啟特定產業
  const urlCat = new URLSearchParams(location.search).get("cat");
  if (urlCat && cats[urlCat]) {
    showIndustry(urlCat);
    const card = document.querySelector(`.ind-card[data-cat="${urlCat}"]`);
    if (card) card.classList.add("active");
  }
});
</script>
</body>
</html>

<script>
const INDUSTRY_ICONS = {
  "半導體": "🔬", "電子零組件": "⚙️", "光電": "💡", "電腦及周邊": "💻",
  "通信網路": "📡", "金融保險": "🏦", "生技醫療": "💊", "鋼鐵": "🏗",
  "化學": "⚗️", "建材營造": "🏢", "電機機械": "🔧", "汽車": "🚗",
  "食品": "🍱", "紡織": "🧶", "觀光餐旅": "🏨", "綠能環保": "🌱",
  "資訊服務": "🖥", "數位雲端": "☁️", "其他電子": "🔌"
};
const HIGHLIGHT_ICONS = {
  "週漲幅 #1": "🚀", "週跌幅 #1": "📉",
  "法人加碼": "🏦", "外資借券放空": "📕",
  "月營收年增": "📈", "高殖利率": "💰"
};

document.addEventListener("DOMContentLoaded", async () => {
  const shell = document.getElementById("weeklyShell");
  let data;
  try {
    const resp = await fetch("../data/weekly_report.json", { cache: "no-cache" });
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    data = await resp.json();
  } catch (e) {
    shell.innerHTML = `<div class="weekly-empty">
      <div class="weekly-empty-icon">📰</div>
      <h2>本週週報生成中</h2>
      <p>每週一早上 8:00 自動發布上一週的台股產業整理。</p>
      <p style="font-size:12px;color:#888;">(${e.message})</p>
    </div>`;
    return;
  }

  const generatedAt = data.generatedAt || "";
  const market = data.market || {};
  const industries = data.industries || [];

  shell.innerHTML = `
    <article class="weekly-report">
      <header class="weekly-head">
        <div class="weekly-eyebrow">領富 AI · 第 ${data.weekNum} 週產業週報</div>
        <h1 class="weekly-title">📰 ${data.weekStart} ~ ${data.weekEnd}<br>台股 10 大產業觀察</h1>
        <div class="weekly-meta">
          <span>🤖 AI 撰寫</span>
          <span>·</span>
          <span>📊 含 ${market.totalStocks || "?"} 檔個股、${industries.length} 大產業</span>
          <span>·</span>
          <span>🕐 ${generatedAt} 自動生成</span>
        </div>
        <div class="weekly-tts-hint">💡 每段標題旁的 <span class="tts-mini-demo">🔊</span> 可朗讀單一段落</div>
      </header>

      <section class="weekly-section weekly-market">
        <h2 class="weekly-h2">
          📊 整體市場觀察
          <button type="button" class="chat-tts-btn weekly-tts-section" data-section-key="market" title="朗讀本段">🔊</button>
        </h2>
        <p class="weekly-text">${escapeHtml(market.summary || "")}</p>
      </section>

      <section class="weekly-section">
        <h2 class="weekly-h2">🔍 10 大產業逐一觀察</h2>
        <p class="weekly-sub">點 🔊 朗讀單一產業，或點上方「朗讀整篇」聽完整週報。每個重點個股可點進詳情頁。</p>
      </section>

      ${industries.map((ind, i) => renderIndustry(ind, i + 1)).join("")}

      <section class="weekly-section weekly-disclaimer">
        <p>※ 本週報由 AI 自動依據公開資料（TWSE / TPEx / MOPS）整理撰寫，不構成個股推薦或買賣建議。<br>
        ※ 個股表現分散投資人風險偏好不同，買賣決定請您自行評估或諮詢合法投顧。</p>
      </section>
    </article>
  `;

  setupTTSButtons(data);
});

function setupTTSButtons(data) {
  const TTS = window.LeadFuTTS;
  if (!TTS || !TTS.isSupported()) {
    document.querySelectorAll(".weekly-tts-section, .weekly-tts-hint").forEach(el => el.style.display = "none");
    return;
  }

  // 單段朗讀（市場 + 每個產業）
  document.querySelectorAll(".weekly-tts-section").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      e.preventDefault();
      const key = btn.dataset.sectionKey;
      let text = "";
      if (key === "market") {
        text = "整體市場觀察。" + (data.market?.summary || "");
      } else if (key && key.startsWith("ind-")) {
        const idx = parseInt(key.slice(4), 10) - 1;
        const ind = data.industries[idx];
        if (ind) {
          text = `${ind.name} 產業。${ind.narrative || ""}`;
        }
      }
      if (text) TTS.toggleButton(btn, text);
    });
  });
}

function renderIndustry(ind, idx) {
  const icon = INDUSTRY_ICONS[ind.name] || "📈";
  const wkClass = ind.avgWeekReturn > 0 ? "up" : (ind.avgWeekReturn < 0 ? "down" : "flat");
  const wkArrow = ind.avgWeekReturn > 0 ? "▲" : (ind.avgWeekReturn < 0 ? "▼" : "─");
  const foreignClass = ind.foreignNetTotal >= 0 ? "up" : "down";
  const fmtNet = (n) => {
    const abs = Math.abs(n);
    if (abs >= 100000) return (n / 10000).toFixed(1) + " 萬張";
    return n.toLocaleString() + " 張";
  };
  return `
    <section class="weekly-section weekly-industry" data-ind-name="${ind.name}">
      <div class="ind-head">
        <div class="ind-num">${String(idx).padStart(2, '0')}</div>
        <div class="ind-info">
          <h2 class="ind-name">${icon} ${ind.name}
            <button type="button" class="chat-tts-btn weekly-tts-section" data-section-key="ind-${idx}" title="朗讀本產業">🔊</button>
          </h2>
          <div class="ind-stats">
            <span>${ind.stockCount} 檔</span>
            <span class="${wkClass}">平均週漲跌 ${wkArrow} ${Math.abs(ind.avgWeekReturn || 0).toFixed(2)}%</span>
            <span class="${foreignClass}">外資 ${ind.foreignNetTotal >= 0 ? '買超' : '賣超'} ${fmtNet(Math.abs(ind.foreignNetTotal))}</span>
          </div>
        </div>
      </div>
      <p class="weekly-text">${escapeHtml(ind.narrative || "")}</p>
      ${ind.highlights && ind.highlights.length ? `
      <div class="ind-highlights">
        <div class="ind-hl-label">本週重點個股</div>
        <div class="ind-hl-grid">
          ${ind.highlights.map(h => `
            <a class="ind-hl-card" href="stock-detail.html?code=${h.code}">
              <div class="ind-hl-kind">${HIGHLIGHT_ICONS[h.kind] || "📌"} ${h.kind}</div>
              <div class="ind-hl-stock"><strong>${h.code}</strong> ${h.name}</div>
              <div class="ind-hl-value">${h.value}</div>
            </a>
          `).join("")}
        </div>
      </div>` : ""}
    </section>
  `;
}

function escapeHtml(s) {
  return String(s || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/\n/g, "<br>");
}
</script>

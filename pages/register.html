<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>免費註冊 - 領富 AI</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header class="top-bar">
  <div class="container top-bar-inner">
    <div class="top-left"><span id="todayDate"></span><span class="divider">|</span><span>台股全市場財經資訊網</span></div>
    <div class="top-right"><a href="login.html">會員登入</a><a href="register.html">免費註冊</a><a href="contact.html">客服 0800-035-178</a></div>
  </div>
</header>

<div class="logo-bar">
  <div class="container logo-bar-inner">
    <a href="../index.html" class="logo">
      <span class="logo-bi">領富</span><span class="logo-ai">AI</span>
      <span class="logo-sub">LeadFu · 領先市場兩步</span>
    </a>
  </div>
</div>

<nav class="main-nav">
  <div class="container">
    <ul>
      <li><a href="../index.html">首頁</a></li>
      <li><a href="stocks.html">股價總覽</a></li>
      <li><a href="news.html">財經新聞</a></li>
      <li><a href="discussion.html">討論區</a></li>
      <li><a href="ipo.html">新股抽籤</a></li>
      <li><a href="announcements.html">公司公告</a></li>
      <li><a href="watchlist.html">自選股</a></li>
      <li><a href="vip.html">VIP 訂閱</a></li>
    </ul>
  </div>
</nav>

<main class="container" style="min-height: 60vh;">
  <div class="form-card" style="max-width: 520px;">
    <h2>免費註冊</h2>
    <p class="form-sub">註冊即享 30 天 VIP 免費試用</p>

    <form id="regForm">
      <div class="form-group">
        <label>姓名</label>
        <input type="text" id="name" placeholder="請輸入真實姓名" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="example@email.com" required>
      </div>
      <div class="form-group">
        <label>手機號碼</label>
        <input type="tel" id="phone" placeholder="09xx-xxx-xxx" required>
      </div>
      <div class="form-group">
        <label>密碼（至少 8 碼）</label>
        <input type="password" id="pwd" placeholder="英數字混合" required>
      </div>
      <div class="form-group">
        <label>確認密碼</label>
        <input type="password" id="pwd2" placeholder="再次輸入密碼" required>
      </div>
      <div class="form-group">
        <label>投資經驗</label>
        <select id="exp">
          <option value="">請選擇</option>
          <option>新手 (1 年以下)</option>
          <option>有經驗 (1-5 年)</option>
          <option>資深 (5 年以上)</option>
        </select>
      </div>
      <div style="font-size:12px;color:#666;margin-bottom:14px;">
        <label><input type="checkbox" required> 我同意 <a href="terms.html" target="_blank">服務條款</a> 與 <a href="privacy.html" target="_blank">隱私權政策</a></label><br>
        <label style="margin-top:6px;display:inline-block;"><input type="checkbox"> 訂閱領富 AI電子報</label>
      </div>
      <button type="submit" class="form-btn">立即註冊</button>
    </form>

    <div style="margin: 18px 0; text-align: center; color: #aaa; font-size: 12px; position: relative;">
      <span style="background: #fff; padding: 0 12px; position: relative; z-index: 1;">或一鍵註冊</span>
      <div style="position: absolute; top: 50%; left: 0; right: 0; border-top: 1px solid #eef0f3; z-index: 0;"></div>
    </div>

    <div style="display: grid; gap: 8px;">
      <button type="button" id="googleRegBtn" style="padding:11px;border:1px solid #d0d5dc;background:#fff;border-radius:6px;font-size:14px;font-weight:600;color:#444;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;">
        <span style="font-size:16px;">G</span> 用 Google 註冊
      </button>
      <button type="button" id="facebookRegBtn" style="padding:11px;border:none;background:#1877F2;color:#fff;border-radius:6px;font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;">
        <span style="font-size:16px;">f</span> 用 Facebook 註冊
      </button>
    </div>

    <div class="form-foot">
      已有帳號？ <a href="login.html" style="font-weight:600;">登入</a>
    </div>
  </div>
</main>

<footer class="site-footer">
  <div class="copyright"><div class="container">© 2026 領富 AI. All rights reserved.</div></div>
</footer>

<script src="../js/main.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/auth.js"></script>
<script>
document.getElementById("regForm").addEventListener("submit", async e => {
  e.preventDefault();
  const btn = e.target.querySelector(".form-btn");
  const pwd  = document.getElementById("pwd").value;
  const pwd2 = document.getElementById("pwd2").value;
  const email = document.getElementById("email").value.trim();
  const name  = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const exp   = document.getElementById("exp").value;

  // 前端基本驗證
  if (pwd.length < 8) return alert("密碼至少 8 碼");
  if (pwd !== pwd2)   return alert("兩次密碼不一致");
  if (!email)         return alert("請輸入 Email");

  // 防止重複點擊
  btn.disabled = true;
  btn.textContent = "註冊中...";

  try {
    const result = await window.LeadFuAuth.signUp({
      email, password: pwd, name, phone, experience: exp
    });

    if (result.needsConfirmation) {
      // Confirm email 開啟時：要收信
      alert("註冊成功！\n\n我們寄了一封確認信到 " + email + "\n請到信箱點擊連結完成驗證，再回來登入。");
      location.href = "login.html";
    } else {
      // Confirm email 關閉時：已自動登入
      alert("註冊成功，已自動登入！");
      location.href = "member.html";
    }
  } catch (err) {
    alert(window.LeadFuAuth.zhError(err));
    btn.disabled = false;
    btn.textContent = "立即註冊";
  }
});

// 社群一鍵註冊
document.getElementById("googleRegBtn").addEventListener("click", async () => {
  try {
    await window.LeadFuAuth.signInWithGoogle();
  } catch (err) {
    alert(window.LeadFuAuth.zhError(err));
  }
});
document.getElementById("facebookRegBtn").addEventListener("click", async () => {
  try {
    await window.LeadFuAuth.signInWithFacebook();
  } catch (err) {
    alert(window.LeadFuAuth.zhError(err));
  }
});
</script>
</body>
</html>
